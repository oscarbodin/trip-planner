<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #141210;
      --bg-card:      #1c1916;
      --bg-card-2:    #232019;
      --gold:         #c9a052;
      --gold-dim:     #8a6c34;
      --gold-glow:    rgba(201,160,82,.12);
      --cream:        #ede5d4;
      --cream-dim:    #a8998a;
      --cream-faint:  #5a5147;
      --green:        #4a9e6e;
      --green-bg:     rgba(74,158,110,.12);
      --amber:        #d4882a;
      --amber-bg:     rgba(212,136,42,.12);
      --red:          #c05050;
      --red-bg:       rgba(192,80,80,.12);
      --border:       rgba(201,160,82,.15);
      --border-faint: rgba(255,255,255,.05);
      --radius:       6px;
      --font-serif:   'Cormorant Garamond', Georgia, serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --font-sans:    'Outfit', sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-left {}

    .trip-label {
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .4rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 300;
      letter-spacing: .02em;
      color: var(--cream);
      line-height: 1.1;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .header-meta {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--cream-dim);
      letter-spacing: .06em;
      text-align: right;
    }

    .header-meta span { display: block; }

    /* ── Summary Bar ─────────────────────────────────────────────────── */
    #summary {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-faint);
      overflow-x: auto;
    }

    .summary-item {
      flex: 1;
      min-width: 120px;
      padding: 1.1rem 1.5rem;
      border-right: 1px solid var(--border-faint);
    }

    .summary-item:last-child { border-right: none; }

    .summary-label {
      font-family: var(--font-mono);
      font-size: .58rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--cream-faint);
      margin-bottom: .25rem;
    }

    .summary-value {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      color: var(--gold);
      font-weight: 500;
    }

    /* ── Main Layout ─────────────────────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── Timeline ────────────────────────────────────────────────────── */
    .timeline {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 28px;
      top: 40px;
      bottom: 40px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim) 10%, var(--gold-dim) 90%, transparent);
      opacity: .4;
    }

    /* ── Stop Card ───────────────────────────────────────────────────── */
    .stop-card {
      position: relative;
      padding: 0 0 3.5rem 72px;
      animation: fadeUp .5s ease both;
    }

    .stop-card:last-child { padding-bottom: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger children */
    .stop-card:nth-child(1) { animation-delay: .05s; }
    .stop-card:nth-child(2) { animation-delay: .12s; }
    .stop-card:nth-child(3) { animation-delay: .19s; }
    .stop-card:nth-child(4) { animation-delay: .26s; }
    .stop-card:nth-child(5) { animation-delay: .33s; }
    .stop-card:nth-child(n+6) { animation-delay: .4s; }

    /* Number bubble */
    .stop-num {
      position: absolute;
      left: 0;
      top: 20px;
      width: 56px;
      height: 56px;
      border: 1px solid var(--gold-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: .7rem;
      font-weight: 500;
      color: var(--gold);
      background: var(--bg);
      letter-spacing: .05em;
    }

    /* Card body */
    .card-body {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s;
    }

    .card-body:hover { border-color: var(--gold-dim); }

    /* Image */
    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--border);
    }

    /* Card top row */
    .card-top {
      padding: 1.25rem 1.5rem .75rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .card-top-left {}

    .stop-type {
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .3rem;
    }

    .stop-name {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--cream);
    }

    .stop-address {
      margin-top: .35rem;
      font-size: .8rem;
      color: var(--cream-dim);
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .stop-address a {
      color: var(--cream-dim);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color .15s, border-color .15s;
    }

    .stop-address a:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }

    /* ── Grid rows ───────────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--border-faint);
    }

    .card-grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .cell {
      padding: .85rem 1.25rem;
      border-right: 1px solid var(--border-faint);
      border-bottom: 1px solid var(--border-faint);
    }

    .cell:last-child { border-right: none; }

    .cell-label {
      font-family: var(--font-mono);
      font-size: .57rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cream-faint);
      margin-bottom: .25rem;
    }

    .cell-value {
      font-family: var(--font-mono);
      font-size: .82rem;
      color: var(--cream);
    }

    .cell-value.large {
      font-size: 1.1rem;
      font-weight: 500;
    }

    .cell-value a {
      color: var(--cream-dim);
      text-decoration: none;
      border-bottom: 1px solid var(--cream-faint);
      transition: color .15s, border-color .15s;
    }

    .cell-value a:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }

    /* Payment status badges */
    .badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .badge-paid    { background: var(--green-bg); color: var(--green); }
    .badge-arrival { background: var(--amber-bg); color: var(--amber); }
    .badge-partial { background: rgba(201,160,82,.15); color: var(--gold); }

    /* Cancellation warning */
    .cancel-warn {
      font-size: .65rem;
      color: var(--red);
      margin-top: .2rem;
      font-family: var(--font-mono);
    }

    .cancel-ok {
      font-size: .65rem;
      color: var(--cream-faint);
      margin-top: .2rem;
      font-family: var(--font-mono);
    }

    /* Notes row */
    .card-notes {
      padding: .85rem 1.25rem;
      border-top: 1px solid var(--border-faint);
      font-size: .82rem;
      color: var(--cream-dim);
      line-height: 1.55;
    }

    .card-notes .cell-label { margin-bottom: .35rem; }

    /* Card footer row */
    .card-footer {
      padding: .75rem 1.25rem;
      border-top: 1px solid var(--border-faint);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .copy-btn {
      font-family: var(--font-mono);
      font-size: .68rem;
      color: var(--cream-dim);
      background: none;
      border: 1px solid var(--border-faint);
      border-radius: 3px;
      padding: .25rem .7rem;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      letter-spacing: .06em;
    }

    .copy-btn:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
      background: var(--gold-glow);
    }

    .booking-link {
      font-family: var(--font-mono);
      font-size: .68rem;
      color: var(--cream-dim);
      text-decoration: none;
      border: 1px solid var(--border-faint);
      border-radius: 3px;
      padding: .25rem .7rem;
      transition: color .15s, border-color .15s, background .15s;
      letter-spacing: .06em;
    }

    .booking-link:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
      background: var(--gold-glow);
    }

    /* Distance to next connector */
    .distance-connector {
      text-align: center;
      padding: 1rem 0;
      display: flex;
      align-items: center;
      gap: .75rem;
      padding-left: 0;
      opacity: .6;
    }

    .distance-connector .line {
      flex: 1;
      height: 1px;
      background: var(--border-faint);
    }

    .distance-connector span {
      font-family: var(--font-mono);
      font-size: .62rem;
      color: var(--cream-faint);
      letter-spacing: .1em;
      white-space: nowrap;
    }

    /* ── Loading / Error states ───────────────────────────────────────── */
    #loading {
      text-align: center;
      padding: 5rem 2rem;
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--cream-faint);
      letter-spacing: .1em;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      background: var(--red-bg);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      color: var(--red);
      font-family: var(--font-mono);
      font-size: .8rem;
      margin: 3rem 0;
      display: none;
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 1.5rem 1rem 1.25rem; }
      main { padding: 2rem 1rem 4rem; }
      .timeline::before { left: 22px; }
      .stop-card { padding-left: 58px; }
      .stop-num { width: 44px; height: 44px; font-size: .62rem; }
      .card-grid { grid-template-columns: 1fr 1fr; }
      .stop-name { font-size: 1.4rem; }
      .header-meta { display: none; }
      #summary { overflow-x: auto; }
      .summary-item { min-width: 100px; padding: .9rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <p class="trip-label">Journey Itinerary</p>
    <h1 id="trip-title">Our <em>Trip</em></h1>
  </div>
  <div class="header-meta">
    <span id="meta-dates">—</span>
    <span id="meta-stops">—</span>
  </div>
</header>

<div id="summary">
  <div class="summary-item">
    <div class="summary-label">Stops</div>
    <div class="summary-value" id="stat-stops">—</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">Nights</div>
    <div class="summary-value" id="stat-nights">—</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">Total km</div>
    <div class="summary-value" id="stat-km">—</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">Still to pay</div>
    <div class="summary-value" id="stat-unpaid">—</div>
  </div>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div>
    Loading itinerary…
  </div>
  <div id="error-msg"></div>
  <div class="timeline" id="timeline" style="display:none"></div>
</main>

<script>
  // ── Fetch & render ────────────────────────────────────────────────────
  async function loadStops() {
    try {
      const res = await fetch("/api/stops");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { stops } = await res.json();
      render(stops);
    } catch (err) {
      document.getElementById("loading").style.display = "none";
      const el = document.getElementById("error-msg");
      el.textContent = `Could not load itinerary: ${err.message}`;
      el.style.display = "block";
    }
  }

  function render(stops) {
    document.getElementById("loading").style.display = "none";
    if (!stops || stops.length === 0) {
      document.getElementById("error-msg").textContent = "No stops found. Upload a CSV via the admin page to get started.";
      document.getElementById("error-msg").style.display = "block";
      return;
    }

    // ── Stats ──────────────────────────────────────────────────────────
    const totalNights = stops.reduce((s, x) => s + (x.nights || 0), 0);
    const totalKm     = stops.reduce((s, x) => s + (x.distance_to_next_km || 0), 0);

    // Unpaid grouped by currency
    const unpaid = {};
    stops.forEach(s => {
      if (s.payment_status !== "Paid" && s.price) {
        const cur = s.currency || "?";
        unpaid[cur] = (unpaid[cur] || 0) + Number(s.price);
      }
    });
    const unpaidStr = Object.entries(unpaid)
      .map(([c, v]) => `${formatCurrency(v, c)}`)
      .join(" + ") || "—";

    document.getElementById("stat-stops").textContent  = stops.length;
    document.getElementById("stat-nights").textContent = totalNights || "—";
    document.getElementById("stat-km").textContent     = totalKm ? totalKm.toLocaleString() : "—";
    document.getElementById("stat-unpaid").textContent = unpaidStr;

    // ── Header meta ────────────────────────────────────────────────────
    const dates = stops.filter(s => s.checkin);
    if (dates.length >= 2) {
      const first = fmtDate(dates[0].checkin);
      const last  = fmtDate(dates[dates.length - 1].checkout || dates[dates.length - 1].checkin);
      document.getElementById("meta-dates").textContent = `${first} – ${last}`;
    }
    document.getElementById("meta-stops").textContent = `${stops.length} stops`;

    // ── Trip title from first & last stop ──────────────────────────────
    if (stops.length >= 2) {
      const a = stops[0].name.split(",")[0];
      const b = stops[stops.length - 1].name.split(",")[0];
      document.getElementById("trip-title").innerHTML = `${a} <em>to</em> ${b}`;
    }

    // ── Render cards ───────────────────────────────────────────────────
    const timeline = document.getElementById("timeline");
    timeline.style.display = "flex";

    stops.forEach((stop, i) => {
      const card = buildCard(stop);
      timeline.appendChild(card);

      // Connector between cards
      if (i < stops.length - 1 && stop.distance_to_next_km) {
        const conn = document.createElement("div");
        conn.className = "distance-connector";
        conn.innerHTML = `<div class="line"></div><span>▸ ${stop.distance_to_next_km} km</span><div class="line"></div>`;
        timeline.appendChild(conn);
      }
    });
  }

  function buildCard(s) {
    const wrap = document.createElement("div");
    wrap.className = "stop-card";

    const numStr = String(s.order_num).padStart(2, "0");
    const payBadge = paymentBadge(s.payment_status);
    const cancelInfo = cancelDisplay(s.cancellation_deadline);
    const mapUrl = s.address
      ? `https://maps.google.com/?q=${encodeURIComponent(s.address)}`
      : null;

    let html = `
      <div class="stop-num">${numStr}</div>
      <div class="card-body">
        ${s.image_url ? `<img class="card-image" src="${esc(s.image_url)}" alt="${esc(s.name)}" loading="lazy" onerror="this.remove()" />` : ""}
        <div class="card-top">
          <div class="card-top-left">
            ${s.type ? `<div class="stop-type">${esc(s.type)}</div>` : ""}
            <div class="stop-name">${esc(s.name)}</div>
            ${s.address ? `
            <div class="stop-address">
              <svg width="11" height="13" viewBox="0 0 11 13" fill="none"><path d="M5.5 0C3.01 0 1 2.01 1 4.5c0 3.375 4.5 8.5 4.5 8.5S10 7.875 10 4.5C10 2.01 7.99 0 5.5 0zm0 6.25a1.75 1.75 0 110-3.5 1.75 1.75 0 010 3.5z" fill="currentColor" opacity=".5"/></svg>
              ${mapUrl ? `<a href="${mapUrl}" target="_blank" rel="noopener">${esc(s.address)}</a>` : esc(s.address)}
            </div>` : ""}
          </div>
        </div>

        <div class="card-grid">
          <div class="cell">
            <div class="cell-label">Check-in</div>
            <div class="cell-value">${fmtDateTime(s.checkin)}</div>
          </div>
          <div class="cell">
            <div class="cell-label">Check-out</div>
            <div class="cell-value">${fmtDateTime(s.checkout)}</div>
          </div>
          <div class="cell">
            <div class="cell-label">Nights</div>
            <div class="cell-value large">${s.nights ?? "—"}</div>
          </div>
        </div>

        <div class="card-grid">
          <div class="cell">
            <div class="cell-label">Price</div>
            <div class="cell-value large">${s.price ? formatCurrency(s.price, s.currency) : "—"}</div>
          </div>
          <div class="cell">
            <div class="cell-label">Payment</div>
            <div class="cell-value">${payBadge}</div>
          </div>
          <div class="cell">
            <div class="cell-label">Cancel by</div>
            <div class="cell-value">${s.cancellation_deadline ? fmtDate(s.cancellation_deadline) : "—"}</div>
            ${cancelInfo}
          </div>
        </div>

        ${(s.booking_ref || s.phone) ? `
        <div class="card-grid card-grid-2">
          ${s.booking_ref ? `
          <div class="cell">
            <div class="cell-label">Booking ref</div>
            <div class="cell-value">${esc(s.booking_ref)}</div>
          </div>` : ""}
          ${s.phone ? `
          <div class="cell">
            <div class="cell-label">Phone</div>
            <div class="cell-value"><a href="tel:${esc(s.phone)}">${esc(s.phone)}</a></div>
          </div>` : ""}
        </div>` : ""}

        ${s.notes ? `
        <div class="card-notes">
          <div class="cell-label">Notes</div>
          ${esc(s.notes)}
        </div>` : ""}

        <div class="card-footer">
          ${s.booking_ref ? `<button class="copy-btn" onclick="copyRef('${esc(s.booking_ref)}', this)">Copy ref</button>` : ""}
          ${s.booking_url ? `<a class="booking-link" href="${esc(s.booking_url)}" target="_blank" rel="noopener">View booking ↗</a>` : ""}
          ${s.address && mapUrl ? `<a class="booking-link" href="${mapUrl}" target="_blank" rel="noopener">Open in Maps ↗</a>` : ""}
        </div>
      </div>
    `;

    wrap.innerHTML = html;
    return wrap;
  }

  // ── Helpers ───────────────────────────────────────────────────────────

  function esc(s) {
    if (!s) return "";
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function fmtDate(str) {
    if (!str) return "—";
    const d = new Date(str);
    if (isNaN(d)) return str;
    return d.toLocaleDateString("en-SE", { day:"numeric", month:"short", year:"numeric" });
  }

  function fmtDateTime(str) {
    if (!str) return "—";
    const d = new Date(str);
    if (isNaN(d)) return str;
    const date = d.toLocaleDateString("en-SE", { day:"numeric", month:"short" });
    const time = str.includes(":") ? str.slice(-5) : "";
    return time ? `${date}, ${time}` : date;
  }

  function formatCurrency(amount, currency) {
    const symbols = { EUR:"€", SEK:"kr", CHF:"Fr.", USD:"$", GBP:"£", NOK:"kr", DKK:"kr" };
    const sym = symbols[currency] || currency || "";
    const num = Number(amount).toLocaleString("sv-SE", { minimumFractionDigits:0, maximumFractionDigits:0 });
    return currency === "SEK" ? `${num} ${sym}` : `${sym}${num}`;
  }

  function paymentBadge(status) {
    if (!status) return '<span class="badge badge-arrival">Unknown</span>';
    if (status === "Paid") return '<span class="badge badge-paid">✓ Paid</span>';
    if (status === "Pay on arrival") return '<span class="badge badge-arrival">On arrival</span>';
    if (status === "Partially paid") return '<span class="badge badge-partial">Partial</span>';
    return `<span class="badge badge-arrival">${esc(status)}</span>`;
  }

  function cancelDisplay(deadlineStr) {
    if (!deadlineStr) return "";
    const deadline = new Date(deadlineStr);
    const now = new Date();
    const daysLeft = Math.ceil((deadline - now) / 86400000);
    if (daysLeft < 0) return `<div class="cancel-ok">passed</div>`;
    if (daysLeft <= 5) return `<div class="cancel-warn">⚠ ${daysLeft}d left</div>`;
    return `<div class="cancel-ok">${daysLeft}d from now</div>`;
  }

  function copyRef(ref, btn) {
    navigator.clipboard.writeText(ref).then(() => {
      const orig = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  loadStops();
</script>

</body>
